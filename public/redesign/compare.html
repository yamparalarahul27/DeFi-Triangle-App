<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>Performance Compare · DeFi Triangle (Redesign)</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/@phosphor-icons/web"></script>
<script src="https://cdn.tailwindcss.com"></script>
<script src="./assets/tw-config.js"></script>
<link rel="stylesheet" href="./assets/theme.css" />

<style>
  body { font-family: "Geist", "IBM Plex Sans", ui-sans-serif, system-ui, sans-serif; }
  .num { font-family: "Geist Mono", "IBM Plex Mono", ui-monospace, monospace; font-variant-numeric: tabular-nums; }
  .card-shadow { box-shadow: 0 1px 2px rgba(0,0,0,0.40), 0 8px 24px -12px rgba(0,0,0,0.55); }
  .press { transition: scale 120ms ease-out, color 150ms ease-out; }
  .press:active { scale: 0.96; }
  .dotgrid { background-image: radial-gradient(circle, rgba(255,255,255,0.05) 1px, transparent 1px); background-size: 24px 24px; }
</style>
</head>

<body class="min-h-dvh bg-surface-page text-fg grid place-items-center p-4 sm:p-6">

  <section class="w-full max-w-5xl rounded-2xl bg-surface-container card-shadow p-5 sm:p-6">

    <!-- header: colored legend bar + label -->
    <div class="flex items-center gap-2.5 mb-5">
      <span id="legend" class="flex items-center gap-1"></span>
      <span class="text-sm font-medium text-fg-muted">Performance</span>
    </div>

    <!-- body: chart + labels (labels wrap below on mobile, column on lg) -->
    <div class="flex flex-col lg:flex-row gap-4">
      <div class="flex-1 rounded-xl dotgrid">
        <svg id="chart" viewBox="0 0 1000 400" preserveAspectRatio="none" class="block w-full h-[260px] sm:h-[360px] lg:h-[400px]"></svg>
      </div>
      <div id="labels" class="flex flex-row flex-wrap lg:flex-col gap-2 lg:w-44 lg:justify-center"></div>
    </div>

    <!-- footer: range tabs + timestamp -->
    <div class="flex items-center justify-between mt-5">
      <div id="ranges" class="flex items-center gap-1 overflow-x-auto scrollbar-hide">
        <button data-r="1D"  class="press px-2.5 py-1.5 rounded-full text-sm text-fg-muted">1D</button>
        <button data-r="1W"  class="press px-2.5 py-1.5 rounded-full text-sm font-semibold bg-surface-bright text-fg">1W</button>
        <button data-r="1M"  class="press px-2.5 py-1.5 rounded-full text-sm text-fg-muted">1M</button>
        <button data-r="3M"  class="press px-2.5 py-1.5 rounded-full text-sm text-fg-muted">3M</button>
        <button data-r="YTD" class="press px-2.5 py-1.5 rounded-full text-sm text-fg-muted">YTD</button>
        <button data-r="1Y"  class="press px-2.5 py-1.5 rounded-full text-sm text-fg-muted">1Y</button>
        <button data-r="All" class="press px-2.5 py-1.5 rounded-full text-sm text-fg-muted">All</button>
      </div>
      <span class="num text-sm text-fg-muted whitespace-nowrap pl-3">Jan 27 · 12:04 PM</span>
    </div>
  </section>

  <script>
    const W = 1000, H = 400, PAD = 28;
    // Solana basket (reshaped from the semiconductor mockup), sorted by performance
    const TOKENS = [
      { sym: "SOL",  pct: 5.24,   col: "#5ad8c4" },
      { sym: "JUP",  pct: 1.38,   col: "#75a7ff" },
      { sym: "JTO",  pct: -3.12,  col: "#a78bfa" },
      { sym: "RAY",  pct: -6.80,  col: "#f4d35e" },
      { sym: "PYTH", pct: -9.34,  col: "#f4f4f5" },
      { sym: "BONK", pct: -11.52, col: "#fb7185" },
      { sym: "WIF",  pct: -14.28, col: "#f59e0b" },
    ];

    const rng = (seed) => { let s = seed >>> 0; return () => (s = (s * 1664525 + 1013904223) >>> 0) / 4294967296; };

    function seriesFor(tok, n) {
      const rand = rng(tok.sym.split("").reduce((a, c) => a * 31 + c.charCodeAt(0), 11));
      const out = []; let walk = 0;
      for (let i = 0; i < n; i++) {
        const t = i / (n - 1);
        walk += (rand() - 0.5) * 1.1;                 // texture
        const arc = 7 * Math.sin(Math.PI * t);         // shared rise → fall
        const trend = tok.pct * t;                     // lands on final %
        const detrend = walk * (1 - t);                // noise fades so end is clean
        out.push(arc + trend + detrend);
      }
      out[0] = 0;                                       // all start together at 0%
      return out;
    }

    let allMin, allMax;
    function render(range) {
      const n = { "1D": 90, "1W": 130, "1M": 110, "3M": 110, "YTD": 150, "1Y": 170, "All": 200 }[range];
      const data = TOKENS.map((t) => seriesFor(t, n));
      allMin = Math.min(...data.flat()); allMax = Math.max(...data.flat());
      const span = (allMax - allMin) || 1;
      const x = (i) => (i / (n - 1)) * W;
      const y = (v) => PAD + (1 - (v - allMin) / span) * (H - PAD * 2);

      // zero baseline (dashed)
      let svg = `<line x1="0" x2="${W}" y1="${y(0).toFixed(1)}" y2="${y(0).toFixed(1)}" stroke="#23262d" stroke-width="1" stroke-dasharray="3 6"/>`;
      data.forEach((vals, k) => {
        const pts = vals.map((v, i) => `${x(i).toFixed(1)},${y(v).toFixed(1)}`).join(" ");
        svg += `<polyline fill="none" stroke="${TOKENS[k].col}" stroke-width="1.6" stroke-opacity="0.92" stroke-linejoin="round" stroke-linecap="round" points="${pts}"/>`;
      });
      document.getElementById("chart").innerHTML = svg;
    }

    // legend bar
    document.getElementById("legend").innerHTML = TOKENS.map((t) =>
      `<span class="w-0.5 h-4 rounded-full" style="background:${t.col}"></span>`).join("");

    // right-side labels (sorted desc already)
    document.getElementById("labels").innerHTML = TOKENS.map((t) => {
      const up = t.pct >= 0, sign = up ? "+" : "−";
      return `<span class="inline-flex items-center justify-between gap-2 px-3 py-1.5 rounded-lg num text-sm font-medium"
        style="background:${t.col}1f;color:${t.col};border:1px solid ${t.col}33">
        <span class="font-semibold">${t.sym}</span><span>${sign}${Math.abs(t.pct).toFixed(2)}%</span></span>`;
    }).join("");

    // range switching
    document.getElementById("ranges").addEventListener("click", (e) => {
      const b = e.target.closest("button[data-r]"); if (!b) return;
      [...document.getElementById("ranges").children].forEach((x) => {
        const on = x === b;
        x.classList.toggle("bg-surface-bright", on);
        x.classList.toggle("text-fg", on);
        x.classList.toggle("font-semibold", on);
        x.classList.toggle("text-fg-muted", !on);
      });
      render(b.dataset.r);
    });

    render("1W");
  </script>
</body>
</html>
