<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>Watchlist · DeFi Triangle (Redesign)</title>

<!-- Fonts: Geist (sans) + Geist Mono (numbers) + IBM Plex fallback -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />

<!-- Phosphor icons (regular + fill + bold weights) -->
<script src="https://unpkg.com/@phosphor-icons/web"></script>

<!-- Tailwind Play CDN + shared token config + theme layer -->
<script src="https://cdn.tailwindcss.com"></script>
<script src="./assets/tw-config.js"></script>
<link rel="stylesheet" href="./assets/theme.css" />

<style>
  body { font-family: "Geist", "IBM Plex Sans", ui-sans-serif, system-ui, sans-serif; }
  .num { font-family: "Geist Mono", "IBM Plex Mono", ui-monospace, monospace; font-variant-numeric: tabular-nums; }
  /* layered depth — shadows over borders (make-interfaces-feel-better #3) */
  .card-shadow { box-shadow: 0 1px 2px rgba(0,0,0,0.40), 0 8px 24px -12px rgba(0,0,0,0.55); }
  .dock-shadow { box-shadow: 0 2px 6px rgba(0,0,0,0.45), 0 16px 40px -12px rgba(0,0,0,0.65); }
  /* row hover/selection — transition only specific props, <200ms, ease-out */
  .wl-row { transition: background-color 150ms ease-out, box-shadow 150ms ease-out; }
  .press { transition: scale 120ms ease-out, background-color 150ms ease-out; }
  .press:active { scale: 0.96; }
  /* icon-only hit area helper → 40×40 (#16) */
  .hit { display:inline-flex; align-items:center; justify-content:center; min-width:40px; min-height:40px; }
  /* staggered enter */
  .stagger > * { animation: fade-up 420ms ease-out backwards; }
</style>
</head>

<body class="min-h-dvh bg-surface-page text-fg">

  <main class="mx-auto max-w-[1500px] px-6 sm:px-10 pb-32 pt-10 stagger">

    <!-- ── Page header ──────────────────────────────────────────── -->
    <header class="flex items-center gap-3 mb-8" style="animation-delay:0ms">
      <span class="grid place-items-center size-7 rounded-md bg-brand/15 text-brand">
        <i class="ph-fill ph-triangle text-base"></i>
      </span>
      <h1 class="text-xl font-semibold tracking-tight text-balance">Watchlist</h1>
    </header>

    <!-- ── Top grid: earnings + performance ─────────────────────── -->
    <section class="grid grid-cols-1 lg:grid-cols-2 gap-5 mb-10">

      <!-- Upcoming earnings (xStocks) -->
      <div class="rounded-2xl bg-surface-container card-shadow p-6" style="animation-delay:80ms">
        <div class="flex items-center justify-between mb-5">
          <h2 class="text-sm font-semibold text-fg">Upcoming earnings</h2>
          <span class="text-[11px] text-fg-subtle">xStocks</span>
        </div>
        <ul id="earnings" class="space-y-1"></ul>
      </div>

      <!-- Performance card -->
      <div class="rounded-2xl bg-surface-container card-shadow p-6 flex flex-col" style="animation-delay:160ms">
        <div class="flex items-start justify-between mb-2">
          <h2 class="text-sm font-semibold text-fg">
            Your performance <span class="num text-buy ml-1">+25.22%</span>
          </h2>
          <div class="flex items-center gap-1 p-0.5 rounded-lg bg-surface-page">
            <button class="press px-2.5 py-1 rounded-md text-xs font-medium bg-surface-bright text-fg">BTC</button>
            <button class="press px-2.5 py-1 rounded-md text-xs font-medium text-fg-muted hover:text-fg">SOL</button>
          </div>
        </div>

        <!-- line chart -->
        <div class="flex-1 min-h-[180px] my-2">
          <svg viewBox="0 0 680 200" preserveAspectRatio="none" class="w-full h-[180px]">
            <!-- benchmark (dotted, muted) -->
            <polyline fill="none" stroke="#a7abb3" stroke-opacity="0.7" stroke-width="1.5" stroke-dasharray="2 4" stroke-linecap="round"
              points="0,150 40,148 80,152 120,145 160,150 200,140 240,146 280,138 320,142 360,135 400,138 440,132 480,136 520,130 560,134 600,128 640,132 680,129" />
            <!-- your performance (solid, brand) -->
            <polyline fill="none" stroke="#5ad8c4" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"
              points="0,150 40,156 80,148 120,158 160,150 200,168 240,150 280,120 320,128 360,96 400,104 440,72 480,84 520,52 560,66 600,40 640,52 680,38" />
          </svg>
        </div>

        <!-- footer: range + legend -->
        <div class="flex items-center justify-between mt-1">
          <div class="flex items-center gap-1">
            <button class="press px-2 py-1 rounded-md text-xs text-fg-muted hover:text-fg">1M</button>
            <button class="press px-2 py-1 rounded-md text-xs text-fg-muted hover:text-fg">3M</button>
            <button class="press px-2 py-1 rounded-md text-xs font-medium bg-surface-bright text-fg">6M</button>
            <button class="press px-2 py-1 rounded-md text-xs text-fg-muted hover:text-fg">YTD</button>
            <button class="press px-2 py-1 rounded-md text-xs text-fg-muted hover:text-fg">5Y</button>
          </div>
          <div class="flex items-center gap-4 text-xs text-fg-muted">
            <span class="inline-flex items-center gap-1.5"><span class="size-1.5 rounded-full bg-brand"></span>Watchlist</span>
            <span class="inline-flex items-center gap-1.5"><i class="ph ph-asterisk text-fg-subtle text-xs"></i>BTC</span>
          </div>
        </div>
      </div>
    </section>

    <!-- ── Watchlist table ──────────────────────────────────────── -->
    <section style="animation-delay:240ms">
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-sm font-semibold text-fg-muted">Your watchlist</h2>
        <div class="flex items-center gap-2">
          <div class="flex items-center gap-0.5 p-0.5 rounded-lg bg-surface-container">
            <button class="press px-2 py-1 rounded-md text-xs font-medium bg-surface-bright text-fg">1D</button>
            <button class="press px-2 py-1 rounded-md text-xs text-fg-muted hover:text-fg">1W</button>
            <button class="press px-2 py-1 rounded-md text-xs text-fg-muted hover:text-fg">1M</button>
          </div>
          <div class="flex items-center gap-0.5 p-0.5 rounded-lg bg-surface-container">
            <button class="hit press rounded-md text-fg-muted hover:text-fg !min-h-[32px] !min-w-[32px]" aria-label="List view"><i class="ph ph-list-dashes"></i></button>
            <button class="hit press rounded-md text-fg !min-h-[32px] !min-w-[32px] bg-surface-bright" aria-label="Grid view"><i class="ph ph-squares-four"></i></button>
          </div>
          <button class="press inline-flex items-center gap-1.5 px-2.5 py-1.5 rounded-lg bg-surface-container text-xs text-fg-muted hover:text-fg">
            <i class="ph ph-columns"></i> Split
          </button>
        </div>
      </div>

      <!-- column headers -->
      <div class="grid grid-cols-[minmax(220px,2fr)_56px_92px_104px_104px_96px_120px_112px_96px] gap-3 px-4 pb-2 text-[11px] text-fg-subtle">
        <div>Token</div><div>Quote</div><div>DEX</div><div>24h</div>
        <div>Market cap</div><div>Volume</div><div class="text-center">Daily chart</div>
        <div class="text-right">Price</div><div class="text-right">7d</div>
      </div>

      <div id="rows" class="space-y-0.5"></div>
    </section>
  </main>

  <!-- ── Floating dock ────────────────────────────────────────── -->
  <div class="fixed bottom-6 left-1/2 -translate-x-1/2 z-50 flex items-center gap-2" style="padding-bottom:env(safe-area-inset-bottom)">
    <nav class="flex items-center gap-1 px-2 py-1.5 rounded-full bg-surface-container-high/95 backdrop-blur-md dock-shadow border border-outline-variant">
      <button class="hit press rounded-full text-fg-muted hover:text-fg" aria-label="Home"><i class="ph ph-house text-xl"></i></button>
      <button class="hit press rounded-full text-fg-muted hover:text-fg" aria-label="Explore"><i class="ph ph-compass text-xl"></i></button>
      <button class="hit press rounded-full text-fg-muted hover:text-fg" aria-label="Calendar"><i class="ph ph-calendar-dots text-xl"></i></button>
      <button class="hit press rounded-full text-on-brand bg-brand" aria-label="Watchlist" aria-current="page"><i class="ph-fill ph-bookmark-simple text-xl"></i></button>
      <button class="hit press rounded-full text-fg-muted hover:text-fg" aria-label="Charts"><i class="ph ph-chart-line text-xl"></i></button>
      <button class="hit press rounded-full text-fg-muted hover:text-fg" aria-label="Messages"><i class="ph ph-chat-circle text-xl"></i></button>
      <button class="hit press rounded-full text-fg-muted hover:text-fg" aria-label="Settings"><i class="ph ph-gear text-xl"></i></button>
    </nav>
    <button class="hit press rounded-full bg-surface-container-high/95 backdrop-blur-md dock-shadow border border-outline-variant text-fg-muted hover:text-fg" aria-label="Search"><i class="ph ph-magnifying-glass text-xl"></i></button>
  </div>

  <!-- corner controls -->
  <button class="fixed bottom-6 left-6 z-40 hit press rounded-full text-fg-subtle hover:text-fg" aria-label="Info"><i class="ph ph-info text-lg"></i></button>
  <button class="fixed bottom-6 right-6 z-40 hit press rounded-full text-fg-subtle hover:text-fg" aria-label="Export"><i class="ph ph-export text-lg"></i></button>

  <script>
    // ── Logobase logo URL (Solana mint or "native") ──────────────
    const L = (mint) => `https://cdn.defitriangle.xyz/logos/solana/${mint}/64.png`;

    // Logo with graceful fallback: colored-initial behind, image overlays;
    // a 404 hides the img and reveals the initial (Logobase fallback rule).
    const mark = (r) => `
      <span class="relative grid place-items-center size-7 shrink-0 rounded-full ring-1 ring-white/10 overflow-hidden text-[11px] font-semibold text-white" style="background:${r.c}">
        ${r.t.replace(/x$/,"").slice(0,1)}
        <img src="${L(r.mint)}" alt="" loading="lazy" class="absolute inset-0 size-full object-cover" onerror="this.style.display='none'" />
      </span>`;

    // ── Upcoming earnings (xStocks track real equity earnings) ───
    const EARN = [
      { t:"NVDAx", n:"NVIDIA xStock",     mint:"Xsc9qvGR1efVDFGLrVsmkzv3qi45LTBjeUKSPmx9qEh", when:"Feb 26 at 5:00 PM", eps:"0.85", badge:"Est.",    c:"#1a1a1a" },
      { t:"AAPLx", n:"Apple xStock",      mint:"XsbEhLAtcf6HdfpFZ5xEMdqW8nfAvcsP5bdudRLJzJp", when:"Jan 30 at 4:30 PM", eps:"2.35", badge:"Beat",   c:"#1a1a1a" },
      { t:"MSFTx", n:"Microsoft xStock",  mint:"XspzcW1PRtgf6Wj92HCiZdjzKCyFekVD8P5Ueh3dRMX", when:"Jan 28 at 5:00 PM", eps:"3.12", badge:"Beat",   c:"#1a1a1a" },
      { t:"METAx", n:"Meta xStock",       mint:"Xsa62P5mvPszXL1krVUnU5ar38bBSVcWAB6fmPCo5Zu", when:"Jan 29 at 4:00 PM", eps:"6.78", badge:"Missed", c:"#1a1a1a" },
      { t:"NFLXx", n:"Netflix xStock",    mint:"XsEH7wWfJJu2ZT3UCFeVfALnVA6CP5ur7Ee11KmzVpL", when:"Jan 21 at 4:45 PM", eps:"4.22", badge:"Est.",   c:"#1a1a1a" },
    ];
    const BADGE = {
      Beat:   "bg-buy-surface text-buy",
      Missed: "bg-sell-surface text-sell",
      "Est.": "bg-surface-bright text-fg-muted",
    };

    document.getElementById("earnings").innerHTML = EARN.map((r) => `
      <li class="flex items-center gap-3 px-2 py-2.5 rounded-lg wl-row hover:bg-surface-container-high">
        ${mark(r)}
        <span class="font-semibold text-sm text-fg w-16">${r.t}</span>
        <span class="text-sm text-fg-muted flex-1 truncate">${r.n}</span>
        <span class="num text-xs text-fg-subtle w-32 text-right">${r.when}</span>
        <span class="num text-sm text-fg w-12 text-right">${r.eps}</span>
        <span class="w-16 text-right"><span class="inline-flex items-center px-2 py-0.5 rounded-md text-[11px] font-medium ${BADGE[r.badge]}">${r.badge}</span></span>
      </li>`).join("");

    // ── Watchlist rows: xStocks + crypto (frozen prototype data) ──
    const ROWS = [
      { t:"TSLAx", n:"Tesla xStock",      mint:"XsDoVfqeBukxuZHWhdvWHBhgEHjGNst4MLodqsJHzoB", dex:"Jupiter", h24:1.24,  mcap:"48.2M", vol:"1.24M",  price:421.80,     d7:3.10,  c:"#1a1a1a", sel:true },
      { t:"NVDAx", n:"NVIDIA xStock",     mint:"Xsc9qvGR1efVDFGLrVsmkzv3qi45LTBjeUKSPmx9qEh", dex:"Jupiter", h24:-0.86, mcap:"92.6M", vol:"2.81M",  price:178.40,     d7:5.40,  c:"#1a1a1a" },
      { t:"SOL",   n:"Solana",            mint:"native",                                       dex:"Jupiter", h24:3.62,  mcap:"92.4B", vol:"3.18B",  price:184.26,     d7:9.40,  c:"#111522" },
      { t:"COINx", n:"Coinbase xStock",   mint:"Xs7ZdzSHLU9ftNJsii5fCeJhoRWSC32SQGzGQtePxNu", dex:"Raydium", h24:2.34,  mcap:"21.3M", vol:"640.2k", price:312.55,     d7:8.10,  c:"#1a1a1a" },
      { t:"JUP",   n:"Jupiter",           mint:"JUPyiwrYJFskUPiHa7hkeR8VUtAeFoSYbKedZNsDvCN", dex:"Jupiter", h24:-1.74, mcap:"1.92B", vol:"142.6M", price:0.6431,     d7:4.20,  c:"#16221f" },
      { t:"SPYx",  n:"SP500 xStock",      mint:"XsoCS1TfEyfFhfvj8EtZ528L3CaKBDBRqRapnBbDF2W", dex:"Jupiter", h24:0.12,  mcap:"64.8M", vol:"1.92M",  price:612.40,     d7:1.20,  c:"#1a1a1a" },
      { t:"BONK",  n:"Bonk",              mint:"DezXAZ8z7PnrnRJjz3wXBoRgixCa6xjnB7YaB1pPB263", dex:"Raydium", h24:6.85,  mcap:"1.74B", vol:"318.4M", price:0.00002314, d7:12.60, c:"#2a1c08" },
      { t:"AAPLx", n:"Apple xStock",      mint:"XsbEhLAtcf6HdfpFZ5xEMdqW8nfAvcsP5bdudRLJzJp", dex:"Orca",    h24:-0.45, mcap:"38.1M", vol:"880.5k", price:232.18,     d7:-1.05, c:"#1a1a1a" },
      { t:"JTO",   n:"Jito",              mint:"jtojtomepa8beP8AuQc6eXt5FriJwfFMwQx2v2f9mCL", dex:"Jupiter", h24:-2.10, mcap:"421.7M",vol:"38.2M",  price:2.4480,     d7:-3.80, c:"#14201d" },
      { t:"WIF",   n:"dogwifhat",         mint:"EKpQGSJtjMFqKZ9KQanSqYXRcF8fBopzLHYxdM65zcjm", dex:"Orca",    h24:4.12,  mcap:"1.86B", vol:"210.9M", price:1.8520,     d7:7.30,  c:"#2a1d14" },
    ];

    // deterministic sparkline from a seed string
    function spark(seed, up) {
      let h = 0; for (const ch of seed) h = (h * 31 + ch.charCodeAt(0)) >>> 0;
      const n = 24, pts = []; let y = 14;
      for (let i = 0; i < n; i++) {
        h = (h * 1103515245 + 12345) >>> 0;
        const step = ((h % 100) / 100 - 0.5) * 8;
        y = Math.max(3, Math.min(25, y + step + (up ? -0.35 : 0.35)));
        pts.push(`${(i / (n - 1) * 84).toFixed(1)},${y.toFixed(1)}`);
      }
      const cut = Math.floor(n * 0.72);
      const stroke = up ? "#34d399" : "#f87171";
      return `<svg viewBox="0 0 84 28" class="w-[84px] h-7">
        <polyline fill="none" stroke="${stroke}" stroke-opacity="0.9" stroke-width="1.25" stroke-linejoin="round" stroke-linecap="round" points="${pts.slice(0, cut + 1).join(" ")}"/>
        <polyline fill="none" stroke="${stroke}" stroke-opacity="0.5" stroke-width="1.25" stroke-dasharray="1.5 2.5" stroke-linecap="round" points="${pts.slice(cut).join(" ")}"/>
      </svg>`;
    }

    const fmtPrice = (p) => p >= 1
      ? "$" + p.toLocaleString("en-US", { minimumFractionDigits: 2, maximumFractionDigits: 2 })
      : p >= 0.01 ? "$" + p.toFixed(4) : "$" + p.toPrecision(4);

    const fmt24h = (v) => {
      const up = v >= 0, cls = up ? "text-buy" : "text-sell";
      const arrow = up ? "ph-arrow-up-right" : "ph-arrow-down-right";
      return `<span class="num ${cls} inline-flex items-center gap-0.5">${up ? "+" : "−"}${Math.abs(v).toFixed(2)}% <i class="ph-bold ${arrow} text-[10px]"></i></span>`;
    };

    const fmt7d = (v) => {
      const up = v >= 0, cls = up ? "bg-buy-surface text-buy" : "bg-sell-surface text-sell";
      return `<span class="num inline-flex items-center justify-end px-2 py-0.5 rounded-md text-xs ${cls}">${up ? "+" : "−"}${Math.abs(v).toFixed(2)}%</span>`;
    };

    document.getElementById("rows").innerHTML = ROWS.map((r) => `
      <div class="grid grid-cols-[minmax(220px,2fr)_56px_92px_104px_104px_96px_120px_112px_96px] gap-3 items-center px-4 py-3 rounded-xl wl-row cursor-pointer ${
        r.sel ? "bg-surface-container ring-1 ring-outline" : "hover:bg-surface-container"
      }">
        <div class="flex items-center gap-3 min-w-0">
          ${mark(r)}
          <span class="font-semibold text-sm text-fg shrink-0">${r.t}</span>
          <span class="text-sm text-fg-muted truncate">${r.n}</span>
        </div>
        <div><span class="num text-[11px] px-1.5 py-0.5 rounded bg-surface-container-high text-fg-subtle">USDC</span></div>
        <div class="text-sm text-fg">${r.dex}</div>
        <div class="text-sm">${fmt24h(r.h24)}</div>
        <div class="num text-sm text-fg-muted">$${r.mcap}</div>
        <div class="num text-sm text-fg-muted">$${r.vol}</div>
        <div class="flex justify-center">${spark(r.t + r.n, r.d7 >= 0)}</div>
        <div class="num text-sm text-fg text-right">${fmtPrice(r.price)}</div>
        <div class="flex items-center justify-end">${fmt7d(r.d7)}</div>
      </div>`).join("");
  </script>
</body>
</html>
