<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Holdings — Account Value</title>
<style>
  :root{
    --bg:#050505;
    --card:#0f0f10;
    --card-2:#121214;
    --line:rgba(255,255,255,.07);
    --line-2:rgba(255,255,255,.10);
    --fg:#f4f4f5;
    --fg-2:#a1a1aa;
    --fg-3:#71717a;
    --pill:#1c1c1f;
    --red:#e5484d;
    --green:#3ddc84;
    --green-dim:rgba(61,220,132,.14);
    --radius:28px;
  }
  *{box-sizing:border-box}
  body{margin:0}
  .page{
    background:var(--bg);
    color:var(--fg);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased;
    text-rendering:optimizeLegibility;
    min-height:100vh;
    padding:28px 32px 56px;
    max-width:1480px;
    margin:0 auto;
  }
  .num{font-variant-numeric:tabular-nums;letter-spacing:-.01em}

  /* ---- toolbar ---- */
  .toolbar{
    display:flex;align-items:center;justify-content:space-between;
    gap:16px;flex-wrap:wrap;
    padding:6px 4px 26px;
  }
  .tabset{display:flex;align-items:center;gap:4px}
  .tab{
    appearance:none;border:0;background:transparent;cursor:pointer;
    color:var(--fg-3);font-size:15px;font-weight:600;
    padding:8px 14px;border-radius:10px;
    transition:color .15s ease,background-color .15s ease;
    font-family:inherit;
  }
  .tab:hover{color:var(--fg-2)}
  .tab[aria-selected="true"]{color:var(--fg);background:var(--pill)}

  /* ---- section head ---- */
  .section-head{
    display:flex;align-items:center;justify-content:space-between;
    padding:4px 4px 16px;
  }
  .section-head h2{margin:0;font-size:24px;font-weight:700;letter-spacing:-.02em}
  .insights{
    display:inline-flex;align-items:center;gap:12px;
    background:transparent;border:0;cursor:pointer;color:var(--fg-2);
    font-size:15px;font-weight:600;font-family:inherit;
    transition:color .15s ease;
  }
  .insights:hover{color:var(--fg)}
  .insights .arrow{
    width:38px;height:38px;border-radius:50%;
    display:grid;place-items:center;
    background:var(--pill);color:var(--fg);
    transition:transform .15s ease,background-color .15s ease;
  }
  .insights:hover .arrow{transform:translateX(2px);background:#27272a}

  /* ---- cards ---- */
  .card{
    background:linear-gradient(180deg,var(--card),var(--card-2));
    border:1px solid var(--line);
    border-radius:var(--radius);
    box-shadow:0 1px 0 rgba(255,255,255,.03) inset, 0 24px 48px -24px rgba(0,0,0,.6);
  }
  .card + .card{margin-top:20px}

  /* ---- stats row ---- */
  .stats{
    display:flex;align-items:flex-start;
    gap:8px;
    padding:26px 28px 8px;
  }
  .stat{
    flex:1 1 0;min-width:0;
    padding:14px 18px;border-radius:14px;
  }
  .stat.is-highlight{background:rgba(255,255,255,.055)}
  .stat .val{font-size:26px;font-weight:600;line-height:1.1}
  .stat .lbl{margin-top:6px;font-size:14px;color:var(--fg-3);font-weight:500}
  .chev{
    flex:0 0 auto;align-self:center;
    width:44px;height:44px;border-radius:12px;
    background:transparent;border:0;cursor:pointer;color:var(--fg-2);
    display:grid;place-items:center;
    transition:background-color .15s ease,color .15s ease;
  }
  .chev:hover{background:rgba(255,255,255,.05);color:var(--fg)}

  /* ---- chart ---- */
  .chart-wrap{position:relative;padding:8px 12px 0}
  .chart-wrap svg{display:block;width:100%;height:auto}
  .xaxis{
    display:flex;justify-content:space-between;
    padding:10px 22px 26px;
    color:var(--fg-3);font-size:13.5px;font-weight:500;
  }

  /* ---- filter tabs ---- */
  .filtertabs{
    display:flex;gap:4px;
    padding:22px 22px 14px;
  }

  /* ---- table ---- */
  .table-scroll{overflow-x:auto;padding:0 8px 18px}
  table{width:100%;border-collapse:collapse;min-width:840px}
  thead th{
    text-align:right;font-size:13px;font-weight:500;color:var(--fg-3);
    padding:10px 16px;white-space:nowrap;
  }
  thead th:first-child{text-align:left}
  .th-1d{
    display:inline-flex;align-items:center;gap:8px;
  }
  .th-1d .badge{
    font-size:11px;font-weight:600;color:var(--fg-2);
    background:var(--pill);border-radius:6px;padding:2px 7px;
  }
  tbody td{
    padding:16px;font-size:15px;text-align:right;white-space:nowrap;
    border-top:1px solid var(--line);
  }
  tbody td:first-child{text-align:left}
  tbody tr:hover{background:rgba(255,255,255,.02)}
  .ticker{display:flex;align-items:center;gap:14px;font-weight:600}
  .dot{width:26px;height:26px;border-radius:50%;flex:0 0 auto;
    box-shadow:0 0 0 1px rgba(255,255,255,.08) inset}
  .alloc{display:inline-flex;align-items:center;gap:10px;justify-content:flex-end}
  .pie{width:16px;height:16px;border-radius:50%}
  .ret{display:inline-flex;align-items:center;gap:12px;justify-content:flex-end}
  .pct{font-weight:600;font-size:13px;border-radius:7px;padding:3px 9px}
  .up{color:var(--green)}
  .down{color:var(--red)}
  .pct.up{background:var(--green-dim)}
  .pct.down{background:rgba(229,72,77,.14)}

  @media (max-width:760px){
    .page{padding:18px 14px 40px}
    .stats{flex-wrap:wrap;gap:6px}
    .stat{flex:1 1 44%}
    .stat .val{font-size:20px}
  }
</style>
</head>
<body>

<div class="page">

  <!-- toolbar -->
  <div class="toolbar">
    <div class="tabset" role="tablist" aria-label="Time range">
      <button class="tab" role="tab">1D</button>
      <button class="tab" role="tab">1W</button>
      <button class="tab" role="tab" aria-selected="true">1M</button>
      <button class="tab" role="tab">3M</button>
      <button class="tab" role="tab">YTD</button>
      <button class="tab" role="tab">All</button>
    </div>
    <div class="tabset" role="tablist" aria-label="View">
      <button class="tab" role="tab" aria-selected="true">Account value</button>
      <button class="tab" role="tab">Performance</button>
    </div>
  </div>

  <!-- section head -->
  <div class="section-head">
    <h2>Holdings</h2>
    <button class="insights">View insights <span class="arrow">→</span></button>
  </div>

  <!-- holdings card -->
  <div class="card">
    <div class="stats">
      <div class="stat is-highlight">
        <div class="val num">+$4,831.63 CAD</div>
        <div class="lbl">Total return</div>
      </div>
      <div class="stat">
        <div class="val num">−$31.29 CAD</div>
        <div class="lbl">Realized return</div>
      </div>
      <div class="stat">
        <div class="val num">$1,219.98 CAD</div>
        <div class="lbl">Dividends earned</div>
      </div>
      <div class="stat">
        <div class="val num">$822.41 CAD</div>
        <div class="lbl">Net deposits</div>
      </div>
      <button class="chev" aria-label="Expand">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M6 9l6 6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </div>

    <div class="chart-wrap">
      <svg id="chart" viewBox="0 0 1320 260" preserveAspectRatio="none" aria-hidden="true"></svg>
    </div>

    <div class="xaxis num">
      <span>Nov 28</span><span>Dec 5</span><span>Dec 12</span>
      <span>Dec 19</span><span>Dec 26</span><span>Jan 2</span>
    </div>
  </div>

  <!-- table card -->
  <div class="card">
    <div class="filtertabs" role="tablist" aria-label="Asset type">
      <button class="tab" role="tab" aria-selected="true">All</button>
      <button class="tab" role="tab">Stocks</button>
      <button class="tab" role="tab">Options</button>
      <button class="tab" role="tab">Futures</button>
    </div>

    <div class="table-scroll">
      <table>
        <thead>
          <tr>
            <th>Holdings</th>
            <th>Ccy</th>
            <th>Allocation</th>
            <th>Qty</th>
            <th>Price</th>
            <th>Total value</th>
            <th><span class="th-1d">Today's return <span class="badge">1D</span></span></th>
          </tr>
        </thead>
        <tbody id="rows"></tbody>
      </table>
    </div>
  </div>

</div>

<script>
(function(){
  /* ---------- line chart ---------- */
  // seeded RNG so the noise is stable across reloads
  function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return ((t^t>>>14)>>>0)/4294967296;};}
  const rng = mulberry32(20260620);

  const W=1320,H=260,padX=28,padTop=24,padBot=24;
  const plotW=W-padX*2, plotH=H-padTop-padBot;

  // trend keypoints: [xfraction, price 0..1]  (1 = top of plot)
  const keys=[
    [0.00,0.46],[0.05,0.51],[0.10,0.33],[0.16,0.30],[0.23,0.42],
    [0.31,0.58],[0.37,0.54],[0.40,0.55],            // 0.40 = Dec 12 cursor / reference
    [0.45,0.49],[0.52,0.66],[0.58,0.78],[0.62,0.81],// Dec 19 peak zone
    [0.68,0.77],[0.74,0.83],[0.78,0.80],            // Dec 26 peak
    [0.82,0.56],[0.86,0.40],[0.90,0.36],[0.94,0.34],// sharp drop -> low
    [0.97,0.38],[1.00,0.40]                          // Jan 2 end (below reference)
  ];
  function trend(f){
    for(let i=0;i<keys.length-1;i++){
      const [x0,y0]=keys[i],[x1,y1]=keys[i+1];
      if(f>=x0&&f<=x1){const t=(f-x0)/(x1-x0||1);return y0+(y1-y0)*t;}
    }
    return keys[keys.length-1][1];
  }
  const N=240, SPLIT=0.40;
  const X=f=>padX+f*plotW;
  const Y=p=>padTop+(1-p)*plotH;

  const pts=[];
  for(let i=0;i<=N;i++){
    const f=i/N;
    const noise=(rng()-0.5)*0.045;
    const p=Math.max(0.05,Math.min(0.97,trend(f)+noise));
    pts.push([X(f),Y(p),f]);
  }

  const refY=Y(trend(SPLIT));        // reference level (Dec 12)
  const endP=trend(1.00);
  const endY=Y(endP);                // end level (Jan 2)
  const splitX=X(SPLIT);
  const endX=X(1.00);

  function path(arr){
    return arr.map((p,i)=>(i?'L':'M')+p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' ');
  }
  const left=pts.filter(p=>p[2]<=SPLIT);
  const right=pts.filter(p=>p[2]>=SPLIT);

  const svg=document.getElementById('chart');
  const NS='http://www.w3.org/2000/svg';
  function add(tag,attrs){const e=document.createElementNS(NS,tag);for(const k in attrs)e.setAttribute(k,attrs[k]);svg.appendChild(e);return e;}

  // shaded loss band (reference -> end), right of cursor
  add('rect',{x:splitX,y:Math.min(refY,endY),width:endX-splitX,height:Math.abs(endY-refY),
    fill:'rgba(229,72,77,.07)'});
  // dotted reference + end lines
  add('line',{x1:splitX,y1:refY,x2:endX,y2:refY,stroke:'rgba(255,255,255,.16)','stroke-width':1,'stroke-dasharray':'2 5'});
  add('line',{x1:splitX,y1:endY,x2:endX,y2:endY,stroke:'rgba(229,72,77,.45)','stroke-width':1,'stroke-dasharray':'2 5'});
  // vertical cursor at Dec 12
  add('line',{x1:splitX,y1:padTop-6,x2:splitX,y2:H-padBot,stroke:'rgba(255,255,255,.22)','stroke-width':1});

  // the two line segments
  add('path',{d:path(left),fill:'none',stroke:'#f4f4f5','stroke-width':2,'stroke-linejoin':'round','stroke-linecap':'round'});
  add('path',{d:path(right),fill:'none',stroke:'#e5484d','stroke-width':2,'stroke-linejoin':'round','stroke-linecap':'round'});

  // end dot
  add('circle',{cx:endX,cy:endY,r:6.5,fill:'#e5484d',stroke:'#050505','stroke-width':2});
})();

/* ---------- table rows ---------- */
(function(){
  const rows=[
    {t:'AAPL', c:'#e5e7eb', alloc:'7.22%', pie:'#f5c518', qty:'75.40', price:'$233.40', total:'$24,318.92', ret:'+$216.30', pct:'+0.90%', up:true},
    {t:'NVDA', c:'#76b900', alloc:'7.02%', pie:'#f5c518', qty:'175.00', price:'$135.20', total:'$23,640.18', ret:'+$214.04', pct:'+0.91%', up:true},
    {t:'MSFT', c:'#3b82f6', alloc:'6.40%', pie:'#3ddc84', qty:'41.00', price:'$402.10', total:'$16,486.10', ret:'+$132.04', pct:'+0.81%', up:true},
    {t:'TSLA', c:'#ef4444', alloc:'5.10%', pie:'#e5484d', qty:'30.00', price:'$248.50', total:'$7,455.00', ret:'−$54.20', pct:'−0.72%', up:false},
    {t:'AMZN', c:'#f59e0b', alloc:'4.80%', pie:'#3ddc84', qty:'22.00', price:'$186.40', total:'$4,100.80', ret:'+$31.10', pct:'+0.76%', up:true},
    {t:'GOOGL',c:'#a78bfa', alloc:'4.20%', pie:'#3ddc84', qty:'18.00', price:'$172.90', total:'$3,112.20', ret:'+$18.40', pct:'+0.59%', up:true},
  ];
  const body=document.getElementById('rows');
  body.innerHTML=rows.map(r=>{
    const cls=r.up?'up':'down';
    const pieDeg=Math.round(parseFloat(r.alloc)*3.6*4); // exaggerate fill for visibility
    return `<tr>
      <td><span class="ticker"><span class="dot" style="background:${r.c}"></span>${r.t}</span></td>
      <td>USD</td>
      <td><span class="alloc num">${r.alloc}<span class="pie" style="background:conic-gradient(${r.pie} ${pieDeg}deg, rgba(255,255,255,.12) 0)"></span></span></td>
      <td class="num">${r.qty}</td>
      <td class="num">${r.price}</td>
      <td class="num">${r.total}</td>
      <td><span class="ret num"><span class="${cls}">${r.ret}</span><span class="pct ${cls}">${r.pct}</span></span></td>
    </tr>`;
  }).join('');
})();
</script>

</body>
</html>
